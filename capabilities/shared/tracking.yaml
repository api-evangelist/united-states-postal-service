naftiko: "1.0.0-alpha1"

info:
  label: "USPS Tracking API"
  description: "Returns tracking status and scan event history for USPS packages."
  tags:
    - USPS
    - Package Tracking
    - Government
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      USPS_BEARER_TOKEN: USPS_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: usps-tracking
      baseUri: https://apis.usps.com
      description: "USPS package tracking API."
      authentication:
        type: bearer
        token: "{{USPS_BEARER_TOKEN}}"
      resources:
        - name: tracking
          path: /tracking/v3/tracking
          description: "Package tracking status and event history."
          operations:
            - name: get-tracking
              method: GET
              description: "Get tracking status for a package."
              inputParameters:
                - name: trackingNumber
                  in: path
                  type: string
                  required: true
                  description: "USPS tracking number."
                - name: expand
                  in: query
                  type: string
                  required: false
                  description: "Optional expansion (SUMMARY or DETAIL)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-multiple-tracking
              method: POST
              description: "Get tracking status for multiple packages."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  trackingNumbers: "{{tools.trackingNumbers}}"

  exposes:
    - type: rest
      port: 8101
      namespace: usps-tracking-rest
      resources:
        - path: /v1/tracking/{trackingNumber}
          name: package-tracking
          description: "Get tracking status for a package."
          operations:
            - method: GET
              name: get-tracking
              description: "Track a package."
              call: "usps-tracking.get-tracking"
              with:
                trackingNumber: "rest.trackingNumber"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tracking
          name: bulk-tracking
          description: "Track multiple packages."
          operations:
            - method: POST
              name: get-multiple-tracking
              description: "Track multiple packages."
              call: "usps-tracking.get-multiple-tracking"
              with:
                trackingNumbers: "rest.trackingNumbers"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: usps-tracking-mcp
      transport: http
      tools:
        - name: get-package-tracking
          description: "Get tracking status and scan event history for a USPS package."
          hints:
            readOnly: true
            openWorld: true
          call: "usps-tracking.get-tracking"
          with:
            trackingNumber: "tools.trackingNumber"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-multiple-package-tracking
          description: "Get tracking status for multiple USPS packages in one request."
          hints:
            readOnly: true
            openWorld: true
          call: "usps-tracking.get-multiple-tracking"
          with:
            trackingNumbers: "tools.trackingNumbers"
          outputParameters:
            - type: object
              mapping: "$."
