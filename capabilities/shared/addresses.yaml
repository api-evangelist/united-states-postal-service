naftiko: "1.0.0-alpha1"

info:
  label: "USPS Addresses API"
  description: "Validates and standardizes US addresses to USPS specifications, with city/state and ZIP Code lookup."
  tags:
    - USPS
    - Address Validation
    - Government
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      USPS_BEARER_TOKEN: USPS_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: usps-addresses
      baseUri: https://apis.usps.com
      description: "USPS address validation and standardization API."
      authentication:
        type: bearer
        token: "{{USPS_BEARER_TOKEN}}"
      resources:
        - name: address
          path: /addresses/v3/address
          description: "Address validation and standardization."
          operations:
            - name: validate-address
              method: GET
              description: "Validates and standardizes a US address to USPS specifications."
              inputParameters:
                - name: streetAddress
                  in: query
                  type: string
                  required: true
                  description: "Primary street address line."
                - name: city
                  in: query
                  type: string
                  required: false
                  description: "City name."
                - name: state
                  in: query
                  type: string
                  required: false
                  description: "Two-letter state abbreviation."
                - name: ZIPCode
                  in: query
                  type: string
                  required: false
                  description: "5-digit ZIP Code."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: city-state
          path: /addresses/v3/city-state
          description: "City and state lookup by ZIP Code."
          operations:
            - name: get-city-state
              method: GET
              description: "Returns the city and state for a given ZIP Code."
              inputParameters:
                - name: ZIPCode
                  in: query
                  type: string
                  required: true
                  description: "5-digit ZIP Code."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: zipcode
          path: /addresses/v3/zipcode
          description: "ZIP Code lookup by address."
          operations:
            - name: get-zip-code
              method: GET
              description: "Returns ZIP Code for a given address."
              inputParameters:
                - name: streetAddress
                  in: query
                  type: string
                  required: true
                  description: "Primary street address."
                - name: city
                  in: query
                  type: string
                  required: true
                  description: "City name."
                - name: state
                  in: query
                  type: string
                  required: true
                  description: "Two-letter state abbreviation."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: usps-addresses-rest
      resources:
        - path: /v1/addresses/validate
          name: address-validation
          description: "Validate and standardize a US address."
          operations:
            - method: GET
              name: validate-address
              description: "Validate address."
              call: "usps-addresses.validate-address"
              with:
                streetAddress: "rest.streetAddress"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/addresses/city-state
          name: city-state-lookup
          description: "Look up city and state by ZIP Code."
          operations:
            - method: GET
              name: get-city-state
              description: "Get city and state."
              call: "usps-addresses.get-city-state"
              with:
                ZIPCode: "rest.ZIPCode"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/addresses/zipcode
          name: zipcode-lookup
          description: "Look up ZIP Code by address."
          operations:
            - method: GET
              name: get-zip-code
              description: "Get ZIP Code."
              call: "usps-addresses.get-zip-code"
              with:
                streetAddress: "rest.streetAddress"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: usps-addresses-mcp
      transport: http
      tools:
        - name: validate-address
          description: "Validate and standardize a US address to USPS specifications."
          hints:
            readOnly: true
            openWorld: true
          call: "usps-addresses.validate-address"
          with:
            streetAddress: "tools.streetAddress"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-city-state
          description: "Get city and state name for a ZIP Code."
          hints:
            readOnly: true
            openWorld: true
          call: "usps-addresses.get-city-state"
          with:
            ZIPCode: "tools.ZIPCode"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-zip-code
          description: "Get ZIP Code for a given street address, city, and state."
          hints:
            readOnly: true
            openWorld: true
          call: "usps-addresses.get-zip-code"
          with:
            streetAddress: "tools.streetAddress"
          outputParameters:
            - type: object
              mapping: "$."
