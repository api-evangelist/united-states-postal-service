naftiko: 1.0.0-alpha2
info:
  label: USPS Tracking API — Tracking
  description: 'USPS Tracking API — Tracking. 2 operations. Lead operation: USPS Tracking Get Multiple Package Tracking Status.
    Self-contained Naftiko capability covering one United States Postal Service business surface.'
  tags:
  - United States Postal Service
  - Tracking
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITED_STATES_POSTAL_SERVICE_API_KEY: UNITED_STATES_POSTAL_SERVICE_API_KEY
capability:
  consumes:
  - type: http
    namespace: tracking-tracking
    baseUri: https://apis.usps.com
    description: USPS Tracking API — Tracking business capability. Self-contained, no shared references.
    resources:
    - name: tracking-v3-tracking
      path: /tracking/v3/tracking
      operations:
      - name: getmultipletracking
        method: POST
        description: USPS Tracking Get Multiple Package Tracking Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tracking-v3-tracking-trackingNumber
      path: /tracking/v3/tracking/{trackingNumber}
      operations:
      - name: gettracking
        method: GET
        description: USPS Tracking Get Package Tracking Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: trackingNumber
          in: path
          type: string
          description: The USPS tracking number for the package.
          required: true
        - name: expand
          in: query
          type: string
          description: Optional expansion for additional detail fields (e.g. SUMMARY).
    authentication:
      type: bearer
      token: '{{env.UNITED_STATES_POSTAL_SERVICE_API_KEY}}'
  exposes:
  - type: rest
    namespace: tracking-tracking-rest
    port: 8080
    description: REST adapter for USPS Tracking API — Tracking. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/tracking/v3/tracking
      name: tracking-v3-tracking
      description: REST surface for tracking-v3-tracking.
      operations:
      - method: POST
        name: getmultipletracking
        description: USPS Tracking Get Multiple Package Tracking Status
        call: tracking-tracking.getmultipletracking
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tracking/v3/tracking/{trackingnumber}
      name: tracking-v3-tracking-trackingnumber
      description: REST surface for tracking-v3-tracking-trackingNumber.
      operations:
      - method: GET
        name: gettracking
        description: USPS Tracking Get Package Tracking Status
        call: tracking-tracking.gettracking
        with:
          trackingNumber: rest.trackingNumber
          expand: rest.expand
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tracking-tracking-mcp
    port: 9090
    transport: http
    description: MCP adapter for USPS Tracking API — Tracking. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: usps-tracking-get-multiple-package
      description: USPS Tracking Get Multiple Package Tracking Status
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: tracking-tracking.getmultipletracking
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: usps-tracking-get-package-tracking
      description: USPS Tracking Get Package Tracking Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tracking-tracking.gettracking
      with:
        trackingNumber: tools.trackingNumber
        expand: tools.expand
      outputParameters:
      - type: object
        mapping: $.
